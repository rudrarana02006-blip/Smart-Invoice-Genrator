<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
          // Theme check
          const theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark-mode');
          } else {
            document.documentElement.classList.remove('dark-mode');
          }
          
          // Auth check - Immediate redirect if no token
          const token = sessionStorage.getItem('token');
          if (!token && window.location.pathname !== '/login') {
            window.location.href = '/login';
          }
        })();
    </script>
    <title>Organization — Smart Invoice</title>
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .user-row {
            padding: 20px 24px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            align-items: center;
            gap: 16px;
        }
    </style>
</head>
<body>
    <div class="ambient-background"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="nav-top">
                <div class="brand">Smart Invoice<span class="dot">.</span></div>
                <ul class="nav-links">
                    <li><a href="/">Dashboard</a></li>
                    <li><a href="/invoices">Invoices</a></li>
                    <li><a href="/clients">Clients</a></li>
                    <li><a href="/create">Create Invoice</a></li>
                    <li><a href="/settings">Settings</a></li>
                </ul>
            </div>
            
            <div class="nav-bottom">
                <div style="padding: 0 24px 20px 24px;">
                    <button id="themeToggle" class="btn btn-secondary" style="width: 100%; font-size: 11px; padding: 10px; font-weight: 700; letter-spacing: 1px;">THEME</button>
                </div>
                <div class="user-profile">
                    <div class="avatar" id="userAvatar">A</div>
                    <div>
                        <div style="font-weight: 600;" id="userName">User</div>
                        <div style="font-size: 12px; color: var(--text-secondary); cursor: pointer;" onclick="logout()">Sign Out</div>
                    </div>
                </div>
                <div class="industrial-footer">Smart Invoice inc.</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-panel">
            <header class="top-bar">
                <h2>Organization Management</h2>
            </header>

            <div class="content-area">
                <!-- Company Profile Section -->
                <div class="glass-panel" style="padding: 24px; margin-bottom: 32px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                        <h3 style="margin: 0; font-family: 'DotGothic16', monospace; font-size: 20px;">Company Profile</h3>
                        <div style="display: flex; gap: 10px;">
                            <button id="saveProfileBtn" class="btn btn-primary">Save Profile</button>
                            <button id="resetDesignBtn" class="btn btn-secondary" style="border-color: rgba(255, 59, 48, 0.3); color: #ff3b30; min-width: 120px;">Reset Design</button>
                        </div>
                    </div>

                    <form id="profileForm" style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                        <div class="form-group">
                            <label>Company Name</label>
                            <input type="text" id="company_name" name="company_name" placeholder="e.g. Acme Corp" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Tagline (Optional)</label>
                            <input type="text" id="company_tagline" name="company_tagline" placeholder="e.g. Engineering Excellence" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" name="email" placeholder="billing@company.com" required class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="phone" name="phone" placeholder="+91 00000 00000" required class="form-control">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Address</label>
                            <textarea id="address" name="address" rows="2" placeholder="Full address..." required class="form-control"></textarea>
                        </div>
                        <div class="form-group">
                            <label>GSTIN (Optional)</label>
                            <input type="text" id="gstin" name="gstin" placeholder="29AABCD1234E1Z5" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>PAN (Optional)</label>
                            <input type="text" id="pan" name="pan" placeholder="AABCD1234E" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Website (Optional)</label>
                            <input type="text" id="website" name="website" placeholder="www.company.com" class="form-control">
                        </div>

                        <div style="grid-column: span 2; margin-top: 20px; border-top: 1px solid var(--border-light); padding-top: 30px;">
                            <h4 style="margin-bottom: 20px; font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-orange); font-family: 'DotGothic16', monospace;">Default Bank Details</h4>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
                                <div class="form-group">
                                    <label>Bank Name</label>
                                    <input type="text" id="bank_name" name="bank_name" placeholder="HDFC Bank" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label>Account Number</label>
                                    <input type="text" id="bank_account" name="bank_account" placeholder="1234 5678 9012" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label>IFSC Code</label>
                                    <input type="text" id="bank_ifsc" name="bank_ifsc" placeholder="HDFC0001234" class="form-control">
                                </div>
                                <div class="form-group">
                                    <label>Beneficiary Name</label>
                                    <input type="text" id="bank_account_name" name="bank_account_name" placeholder="Acme Corp" class="form-control">
                                </div>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Team Members Section -->
                <div class="glass-panel" style="padding: 24px;">
                    <h3 style="margin-bottom: 24px; font-family: 'NDot', sans-serif;">Team Members</h3>
                    
                    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr auto; padding: 0 24px 16px 24px; color: var(--text-secondary); font-size: 14px; font-weight: 500; border-bottom: 1px solid var(--border-light); margin-bottom: 16px;">
                        <div>User Email</div>
                        <div>Role</div>
                        <div>Status</div>
                        <div style="width: 150px; text-align: center;">Actions</div>
                    </div>
                    
                    <div id="userList" style="min-height: 200px; display: flex; flex-direction: column; gap: 8px;">
                        <!-- Users will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="industrial-footer">Smart Invoice inc.</div>

    <script src="/js/utils.js?v=5"></script>
    <script src="/js/api.js?v=5"></script>
    <script src="/js/org.js?v=5"></script>
</body>
</html>
