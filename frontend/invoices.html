<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices | Smart Invoice</title>
    <script>
        (function() {
          // Theme check
          const theme = localStorage.getItem('theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark-mode');
          } else {
            document.documentElement.classList.remove('dark-mode');
          }
          
          // Auth check - Immediate redirect if no token
          const token = sessionStorage.getItem('token');
          if (!token && window.location.pathname !== '/login') {
            window.location.href = '/login';
          }
        })();
    </script>
    <link href="/css/style.css" rel="stylesheet">
    <link href="/css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="ambient-background"></div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="nav-top">
                <div class="brand">Smart Invoice<span class="dot">.</span></div>
                <ul class="nav-links">
                    <li><a href="/">Dashboard</a></li>
                    <li><a href="/invoices" class="active">Invoices</a></li>
                    <li><a href="/clients">Clients</a></li>
                    <li><a href="/create">Create Invoice</a></li>
                    <li><a href="/settings">Settings</a></li>
                </ul>
            </div>
            
            <div class="nav-bottom">
                <div style="padding: 0 24px 20px 24px;">
                    <button id="themeToggle" class="btn btn-secondary" style="width: 100%; font-size: 11px; padding: 10px; font-weight: 700; letter-spacing: 1px;">THEME</button>
                </div>
                <div class="user-profile">
                    <div class="avatar" id="userAvatar">A</div>
                    <div>
                        <div style="font-weight: 600;" id="userName">User</div>
                        <div style="font-size: 12px; color: var(--text-secondary); cursor: pointer;" onclick="logout()">Sign Out</div>
                    </div>
                </div>
                <div class="industrial-footer">Smart Invoice inc.</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-panel">
            <header class="top-bar">
                <h2>Invoice Management</h2>
                <div style="display: flex; gap: 16px;">
                    <input type="text" id="searchInput" class="form-control" placeholder="Search invoices..." style="width: 300px;">
                    <a href="/create" class="btn btn-primary">New Invoice</a>
                </div>
            </header>

            <div class="content-area">
                <div class="glass-panel" style="padding: 24px;">
                    <div id="listHeader" style="display: grid; grid-template-columns: 1fr 2fr 1fr 1fr 1.2fr auto; padding: 0 24px 16px 24px; color: var(--text-secondary); font-size: 14px; font-weight: 500; border-bottom: 1px solid var(--border-light); margin-bottom: 16px;">
                        <div>Invoice #</div>
                        <div>Client Name</div>
                        <div>Status</div>
                        <div style="text-align: right;">Amount</div>
                        <div id="colGeneratedBy" style="text-align: center;">Generated By</div>
                        <div style="width: 80px; text-align: center;">Actions</div>
                    </div>
                    
                    <div id="invoiceList" style="min-height: 400px; display: flex; flex-direction: column; gap: 8px;">
                        <!-- Skeletons -->
                        <div class="invoice-row glass-panel hover-specular">
                            <div class="skeleton skeleton-text" style="width: 80%;"></div>
                            <div class="skeleton skeleton-text" style="width: 60%;"></div>
                            <div class="skeleton skeleton-text" style="width: 90%;"></div>
                            <div class="skeleton skeleton-text" style="width: 40%;"></div>
                        </div>
                        <div class="invoice-row glass-panel hover-specular">
                            <div class="skeleton skeleton-text" style="width: 70%;"></div>
                            <div class="skeleton skeleton-text" style="width: 50%;"></div>
                            <div class="skeleton skeleton-text" style="width: 80%;"></div>
                            <div class="skeleton skeleton-text" style="width: 30%;"></div>
                        </div>
                    </div>
                    
                    <!-- Pagination -->
                    <div style="display: flex; justify-content: center; gap: 12px; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border-light);">
                        <button id="btnPrevPage" class="btn btn-secondary" disabled>Previous</button>
                        <button id="btnNextPage" class="btn btn-secondary">Next</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/utils.js?v=5"></script>
    <script src="/js/api.js?v=5"></script>
    <script src="/js/magnetic.js?v=5"></script>
    <script src="/js/invoice-list.js?v=5"></script>
</body>
</html>
